name: Continuous Integration

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    dotnet-build-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install npm dependencies
              run: npm ci

            - name: Verify React SPA (lint + typecheck + build)
              run: npm run verify

            - name: Setup .NET 10
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore .NET dependencies
              run: dotnet restore ApiTestSpark.slnx

            - name: Build solution
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  dotnet build ApiTestSpark.slnx --configuration Release --no-restore /p:Version=$VERSION

            - name: Run integration tests
              run: >
                  dotnet test ApiTestSpark.slnx
                  --configuration Release
                  --no-build
                  --verbosity normal
                  --logger "trx"
                  --collect:"XPlat Code Coverage"
                  --results-directory ./TestResults

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results
                  path: ./TestResults
                  if-no-files-found: warn

            - name: Check .NET package vulnerabilities
              run: dotnet list ApiTestSpark/ApiTestSpark.csproj package --vulnerable --include-transitive

            - name: Check npm vulnerabilities
              run: npm audit --audit-level=high
